name: CI

on:
  push:
    branches:
      - main
    tags:
      - source-*
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Swift and app validation
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Calculate build parallelism
        shell: bash
        run: |
          jobs=$(( $(sysctl -n hw.ncpu) - 1 ))
          if [ "$jobs" -lt 1 ]; then jobs=1; fi
          echo "SWIFT_BUILD_JOBS=$jobs" >> "$GITHUB_ENV"

      - name: Run Swift tests
        run: swift test --jobs "$SWIFT_BUILD_JOBS"

      - name: Test Wine source synchronization
        run: Tests/Shell/ensure_switchyard_wine_test.sh

      - name: Validate release packaging script
        run: bash -n script/release_app.sh

      - name: Test runner lifecycle and logging
        run: Tests/Shell/runner_prefix_session_test.sh

      - name: Verify app bundle
        env:
          SWITCHYARD_SKIP_RUNTIME_ENSURE: "1"
        run: ./script/build_and_run.sh --verify
